name: YouTube Playlist to Google Drive

on:
  workflow_dispatch:
    inputs:
      playlist_url:
        description: 'YouTube Playlist URL'
        required: true
      drive_folder:
        description: 'Destination Folder Name in Google Drive'
        required: true
        default: 'YouTube_Downloads'

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg rclone
          pip install https://github.com/yt-dlp/yt-dlp/archive/master.zip

      - name: Configure Rclone
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG_DATA }}" > ~/.config/rclone/rclone.conf

      - name: Download Playlist
        run: |
          mkdir -p downloads
          yt-dlp --extractor-args "youtube:player_client=android_vr" \
                 -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
                 --yes-playlist \
                 --newline \
                 -o "downloads/%(title)s.%(ext)s" \
                 "${{ github.event.inputs.playlist_url }}"

      - name: Upload to Google Drive
        run: |
          rclone copy downloads/ "gdrive:${{ github.event.inputs.drive_folder }}" \
                 --progress \
                 --drive-chunk-size 64M \
                 --buffer-size 32M
                 
