name: YouTube Playlist to GDrive (Streaming)

on:
  workflow_dispatch:

jobs:
  download_and_upload:
    runs-on: ubuntu-latest
    
    env:
      RCLONE_CONF_JSON: ${{ secrets.RCLONE_CONF }}

    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install yt-dlp and Rclone
        run: |
          # Force install the absolute newest unreleased version of yt-dlp
          pip install -U https://github.com/yt-dlp/yt-dlp/archive/master.zip
          sudo apt-get update -qq
          sudo apt-get install -y rclone

      - name: Configure Rclone Connection
        run: |
          mkdir -p ~/.config/rclone
          cat << EOF > ~/.config/rclone/rclone.conf
          [gdrive]
          type = drive
          scope = drive
          token = $RCLONE_CONF_JSON
          EOF

      - name: Stream Playlist to Google Drive
        run: |
          # Your exact playlist link
          PLAYLIST_URL="https://youtube.com/playlist?list=PL5JWDhQfiVQ4YKgJbzA5ngyPSOfZr8fno"
          
          # Your target folder in Google Drive
          DRIVE_FOLDER="gdrive:Telegram_Archive/Reasoning/"
          
          echo "Starting 1-by-1 transfer for: $PLAYLIST_URL"
          
          # The new --extractor-args flag disguises the server as an Android device!
          yt-dlp -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
                 -o "%(playlist_index)02d - %(title)s.%(ext)s" \
                 --extractor-args "youtube:client=android,web" \
                 --ignore-errors \
                 --no-warnings \
                 --exec "rclone move {} \"$DRIVE_FOLDER\" --drive-chunk-size 64M -v" \
                 "$PLAYLIST_URL"
          
          echo "Playlist transfer complete!"
          
