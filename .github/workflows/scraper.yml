name: YouTube Playlist to GDrive (Authenticated)

on:
  workflow_dispatch:
    inputs:
      playlist_url:
        description: 'YouTube Playlist URL'
        required: true
        type: string
      drive_folder:
        description: 'Google Drive destination folder path'
        required: false
        default: 'gdrive:YouTube_Downloads'
        type: string

jobs:
  download_and_upload:
    runs-on: ubuntu-latest

    env:
      RCLONE_CONF_JSON: ${{ secrets.RCLONE_CONF }}
      YT_COOKIES_TXT: ${{ secrets.YT_COOKIES }}

    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install yt-dlp and Rclone
        run: |
          pip install -U "yt-dlp[default]"
          sudo apt-get update -qq
          sudo apt-get install -y rclone

      - name: Configure Rclone
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [gdrive]
          type = drive
          scope = drive
          token = ${RCLONE_CONF_JSON}
          EOF

      - name: Build Cookie File
        run: |
          printf '%s' "$YT_COOKIES_TXT" > cookies.txt
          echo "Cookie file lines: $(wc -l < cookies.txt)"
          head -1 cookies.txt

      - name: Verify Cookies Format
        run: |
          if ! head -1 cookies.txt | grep -q "Netscape HTTP Cookie File"; then
            echo "ERROR: cookies.txt is not in Netscape format!"
            exit 1
          fi
          echo "✓ Cookie format OK"

      - name: Stream Playlist to Google Drive
        run: |
          DRIVE_FOLDER="${{ github.event.inputs.drive_folder }}"
          PLAYLIST_URL="${{ github.event.inputs.playlist_url }}"

          echo "Starting transfer: $PLAYLIST_URL"
          echo "Destination: $DRIVE_FOLDER"

          yt-dlp \
            -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
            -o "/tmp/ytdl/%(playlist_index)02d - %(title)s.%(ext)s" \
            --cookies cookies.txt \
            --ignore-errors \
            --retries 5 \
            --fragment-retries 5 \
            --no-warnings \
            --progress \
            "$PLAYLIST_URL"

          echo "Upload to Drive..."
          rclone move /tmp/ytdl/ "$DRIVE_FOLDER" \
            --drive-chunk-size 64M \
            --transfers 2 \
            -v

          echo "✓ Transfer complete!"

      - name: Cleanup
        if: always()
        run: |
          rm -f cookies.txt
          rm -rf /tmp/ytdl/
