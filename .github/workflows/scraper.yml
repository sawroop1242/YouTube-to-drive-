name: YouTube Playlist to GDrive (Streaming)

on:
  workflow_dispatch:

jobs:
  download_and_upload:
    runs-on: ubuntu-latest
    
    env:
      RCLONE_CONF_JSON: ${{ secrets.RCLONE_CONF }}
      YT_COOKIES_TXT: ${{ secrets.YT_COOKIES }}

    steps:
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install yt-dlp and Rclone
        run: |
          pip install -U https://github.com/yt-dlp/yt-dlp/archive/master.zip
          sudo apt-get update -qq
          sudo apt-get install -y rclone

      - name: Configure Rclone Connection
        run: |
          mkdir -p ~/.config/rclone
          cat << EOF > ~/.config/rclone/rclone.conf
          [gdrive]
          type = drive
          scope = drive
          token = $RCLONE_CONF_JSON
          EOF

      - name: Build Cookie File
        run: |
          # Creates a physical cookies.txt file from your GitHub Secret
          cat << EOF > cookies.txt
          $YT_COOKIES_TXT
          EOF

      - name: Stream Playlist to Google Drive
        run: |
          # Your exact direct YouTube URL
          PLAYLIST_URL="https://www.youtube.com/playlist?list=PL5JWdhQfiVQ4YKgJbzA5ngyPSOfZr8fnO"
          
          DRIVE_FOLDER="gdrive:Telegram_Archive/Reasoning/"
          
          echo "Starting authenticated transfer for: $PLAYLIST_URL"
          
          # Notice the new --cookies flag added here!
          yt-dlp -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
                 -o "%(playlist_index)02d - %(title)s.%(ext)s" \
                 --cookies cookies.txt \
                 --ignore-errors \
                 --no-warnings \
                 --exec "rclone move {} \"$DRIVE_FOLDER\" --drive-chunk-size 64M -v" \
                 "$PLAYLIST_URL"
          
          echo "Playlist transfer complete!"
          
