name: YouTube Playlist to Google Drive

on:
  workflow_dispatch:
    inputs:
      playlist_url:
        description: 'YouTube Playlist URL'
        required: true
      drive_path:
        description: 'Destination Path in Google Drive'
        required: true
        default: 'Telegram_Archive/Reasoning'

jobs:
  download_and_upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg rclone

      - name: Install Latest yt-dlp
        run: |
          python3 -m pip install -U pip
          pip install https://github.com/yt-dlp/yt-dlp/archive/master.zip

      - name: Configure Rclone
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONF }}" > ~/.config/rclone/rclone.conf

      - name: Download Playlist
        run: |
          mkdir -p temp_downloads
          yt-dlp --extractor-args "youtube:player_client=android_vr" \
                 -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
                 --yes-playlist \
                 --ignore-errors \
                 --newline \
                 -o "temp_downloads/%(title)s.%(ext)s" \
                 "${{ github.event.inputs.playlist_url }}"

      - name: Upload to Google Drive
        run: |
          # Use 'copy' instead of 'move' for the first test to be safe
          rclone copy temp_downloads/ "gdrive:${{ github.event.inputs.drive_path }}" \
                 --progress \
                 --drive-chunk-size 64M \
                 --buffer-size 32M \
                 --transfers 4
                 
